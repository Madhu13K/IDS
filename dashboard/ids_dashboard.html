<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDS Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg:     #05080f;
    --panel:  #0b1120;
    --border: #1a2d50;
    --accent: #0ff;
    --danger: #ff3c5f;
    --safe:   #00e5a0;
    --warn:   #ffc93c;
    --text:   #a8c8e8;
    --dim:    #3a5070;
    --glow-c: 0,255,255;
    --glow-d: 255,60,95;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scan line effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 4s linear infinite;
    z-index: 999;
    opacity: .4;
    pointer-events: none;
  }
  @keyframes scan { from { transform: translateY(0) } to { transform: translateY(100vh) } }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(11,17,32,.95);
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(var(--glow-c),.7);
  }
  .logo span { color: #fff; }
  #clock { font-size: .85rem; color: var(--dim); letter-spacing: .08em; }
  #status-pill {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: .9rem;
    letter-spacing: .1em;
    padding: .35rem 1.1rem;
    border-radius: 100px;
    border: 1px solid var(--safe);
    color: var(--safe);
    text-shadow: 0 0 8px var(--safe);
    transition: all .3s;
  }
  #status-pill.alert {
    border-color: var(--danger);
    color: var(--danger);
    text-shadow: 0 0 10px var(--danger);
    animation: pulse-border 1s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 4px rgba(var(--glow-d),.3) }
    50%      { box-shadow: 0 0 16px rgba(var(--glow-d),.9) }
  }

  /* ── layout ── */
  main {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 1.2rem;
    padding: 1.4rem 2rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .stats-col {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    grid-row: 1 / 4;
  }

  /* ── cards ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.1rem 1.3rem;
  }
  .card-title {
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: .7rem;
  }
  .card-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .card-value.danger { color: var(--danger); text-shadow: 0 0 12px rgba(var(--glow-d),.5) }
  .card-value.safe   { color: var(--safe);   text-shadow: 0 0 12px rgba(0,229,160,.4) }
  .gauge { height: 3px; background: var(--border); border-radius: 2px; margin-top: .6rem; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 2px; transition: width .6s ease, background .4s; background: var(--accent); }

  /* ── chart ── */
  .chart-area {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.1rem 1.3rem;
  }
  .chart-area h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: .75rem;
    letter-spacing: .14em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: .8rem;
  }
  #scoreChart { width: 100% !important; height: 130px !important; }

  /* ── inject panel ── */
  .inject-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.1rem 1.3rem;
  }
  .inject-panel h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: .75rem;
    letter-spacing: .14em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .field-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: .7rem 1.2rem;
  }
  label {
    display: flex;
    flex-direction: column;
    gap: .3rem;
    font-size: .65rem;
    letter-spacing: .1em;
    color: var(--dim);
    text-transform: uppercase;
  }
  input[type=number] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: .85rem;
    padding: .4rem .6rem;
    width: 100%;
    transition: border-color .2s;
  }
  input[type=number]:focus { outline: none; border-color: var(--accent); }

  .btn-row { margin-top: 1rem; display: flex; gap: .7rem; flex-wrap: wrap; }
  button.primary {
    background: rgba(var(--glow-c),.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    letter-spacing: .1em;
    padding: .5rem 1.4rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }
  button.primary:hover { background: rgba(var(--glow-c),.2); box-shadow: 0 0 12px rgba(var(--glow-c),.3); }
  button.danger-btn {
    background: rgba(var(--glow-d),.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    letter-spacing: .1em;
    padding: .5rem 1.4rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }
  button.danger-btn:hover { background: rgba(var(--glow-d),.2); }

  #result-banner {
    margin-top: .9rem;
    padding: .7rem 1rem;
    border-radius: 4px;
    font-size: .8rem;
    display: none;
    border: 1px solid;
  }
  #result-banner.safe  { border-color: var(--safe);   color: var(--safe);   background: rgba(0,229,160,.06) }
  #result-banner.alert { border-color: var(--danger);  color: var(--danger); background: rgba(255,60,95,.06) }

  /* ── log ── */
  .log-area {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .8rem 1.3rem;
    border-bottom: 1px solid var(--border);
  }
  .log-header h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: .75rem;
    letter-spacing: .14em;
    color: var(--dim);
    text-transform: uppercase;
  }
  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    padding: .25rem .7rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
  }
  #clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  #log-body { flex: 1; overflow-y: auto; max-height: 300px; }
  #log-body::-webkit-scrollbar { width: 4px }
  #log-body::-webkit-scrollbar-track { background: var(--bg) }
  #log-body::-webkit-scrollbar-thumb { background: var(--dim) }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: .65rem;
    letter-spacing: .1em;
    color: var(--dim);
    padding: .5rem 1rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--panel);
  }
  td {
    padding: .55rem 1rem;
    font-size: .78rem;
    border-bottom: 1px solid rgba(26,45,80,.5);
    white-space: nowrap;
  }
  tr.row-alert td { color: var(--danger); }
  tr.row-normal td { color: var(--text); }
  tr.new-row { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px) } to { opacity:1 } }

  .badge {
    display: inline-block;
    font-size: .65rem;
    padding: .15rem .5rem;
    border-radius: 3px;
    letter-spacing: .08em;
  }
  .badge-alert  { background: rgba(255,60,95,.15);  color: var(--danger); border: 1px solid rgba(255,60,95,.4) }
  .badge-normal { background: rgba(0,229,160,.1);   color: var(--safe);   border: 1px solid rgba(0,229,160,.3) }

  #flask-status {
    font-size: .7rem;
    color: var(--dim);
    margin-top: .4rem;
  }
  #flask-status.online { color: var(--safe); }
  #flask-status.offline { color: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">IDS<span>/</span>MONITOR</div>
  <div id="clock">--:--:--</div>
  <div id="status-pill">● SYSTEM SECURE</div>
</header>

<main>
  <!-- ── stats column ── -->
  <div class="stats-col">
    <div class="card">
      <div class="card-title">Total Checks</div>
      <div class="card-value safe" id="stat-total">0</div>
      <div id="flask-status">Waiting for Flask...</div>
    </div>
    <div class="card">
      <div class="card-title">Intrusions Detected</div>
      <div class="card-value danger" id="stat-alerts">0</div>
    </div>
    <div class="card">
      <div class="card-title">False-Positive Rate</div>
      <div class="card-value" id="stat-fpr">—</div>
    </div>
    <div class="card">
      <div class="card-title">Last Score</div>
      <div class="card-value" id="stat-score">—</div>
      <div class="gauge"><div class="gauge-fill" id="score-bar" style="width:50%"></div></div>
    </div>
    <div class="card">
      <div class="card-title">Threshold</div>
      <div class="card-value" id="stat-thresh">0.0385</div>
    </div>
  </div>

  <!-- ── chart ── -->
  <div class="chart-area">
    <h2>Anomaly Score — Last 40 Checks (dashed = threshold)</h2>
    <canvas id="scoreChart"></canvas>
  </div>

  <!-- ── inject panel ── -->
  <div class="inject-panel">
    <h2>Simulate / Inject Sample</h2>
    <div class="field-grid">
      <label>CPU %   <input type="number" id="f-cpu"   value="30"  min="0" max="100"></label>
      <label>Mem %   <input type="number" id="f-mem"   value="45"  min="0" max="100"></label>
      <label>Disk %  <input type="number" id="f-disk"  value="55"  min="0" max="100"></label>
      <label>Net KB/s<input type="number" id="f-net"   value="10"  min="0"></label>
      <label>Procs   <input type="number" id="f-proc"  value="330" min="0"></label>
      <label>Spawn/s <input type="number" id="f-spawn" value="0"   min="0" step="0.1"></label>
      <label>Sudo    <input type="number" id="f-sudo"  value="0"   min="0"></label>
      <label>FailLog <input type="number" id="f-fail"  value="0"   min="0"></label>
    </div>
    <div class="btn-row">
      <button class="primary"    onclick="injectNormal()">Inject Normal</button>
      <button class="danger-btn" onclick="injectAnomaly()">Inject Attack</button>
      <button class="primary"    onclick="runCustom()">Run Custom →</button>
    </div>
    <div id="result-banner"></div>
  </div>

  <!-- ── log ── -->
  <div class="log-area">
    <div class="log-header">
      <h2>Event Log</h2>
      <button id="clear-btn" onclick="clearLog()">Clear</button>
    </div>
    <div id="log-body">
      <table>
        <thead>
          <tr>
            <th>#</th><th>TIME</th><th>SOURCE</th><th>VERDICT</th><th>SCORE</th>
            <th>CPU</th><th>MEM</th><th>NET</th><th>PROC</th><th>SUDO</th><th>FAIL</th>
          </tr>
        </thead>
        <tbody id="log-rows"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- single Chart.js load — no duplicates -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── state ──────────────────────────────────────────────────────────────────────
let THRESHOLD    = 0.0385;
let scoreHistory = [];
let totalChecks  = 0;
let alertCount   = 0;

// ── chart ──────────────────────────────────────────────────────────────────────
const ctx   = document.getElementById('scoreChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        data: [],
        borderColor: 'rgba(0,255,255,0.7)',
        backgroundColor: 'rgba(0,255,255,0.04)',
        borderWidth: 1.5,
        pointRadius: 3,
        tension: 0.3,
        fill: true,
        pointBackgroundColor: []
      },
      {
        data: [],
        borderColor: 'rgba(255,60,95,0.6)',
        borderWidth: 1,
        borderDash: [5,4],
        pointRadius: 0,
        fill: false,
      }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { display: false },
      y: {
        grid: { color: 'rgba(26,45,80,0.6)' },
        ticks: { color: '#3a5070', font: { family: 'Share Tech Mono', size: 10 } }
      }
    }
  }
});

// ── record a sample and update UI ─────────────────────────────────────────────
function recordSample(data, source) {
  const score    = data.score;
  const isAlert  = data.intrusion;
  const ts       = new Date().toTimeString().slice(0,8);

  THRESHOLD = data.threshold;
  totalChecks++;
  if (isAlert) alertCount++;

  // stat cards
  document.getElementById('stat-total').textContent  = totalChecks;
  document.getElementById('stat-alerts').textContent = alertCount;
  document.getElementById('stat-fpr').textContent    =
    ((alertCount / totalChecks) * 100).toFixed(1) + '%';
  document.getElementById('stat-score').textContent  = score.toFixed(4);
  document.getElementById('stat-thresh').textContent = THRESHOLD;

  // score gauge
  const pct = Math.max(0, Math.min(100, ((score + 0.1) / 0.4) * 100));
  const bar  = document.getElementById('score-bar');
  bar.style.width      = pct + '%';
  bar.style.background = isAlert ? 'var(--danger)' : 'var(--accent)';

  // status pill
  const pill = document.getElementById('status-pill');
  pill.textContent = isAlert ? '⚠ INTRUSION DETECTED' : '● SYSTEM SECURE';
  pill.className   = isAlert ? 'alert' : '';

  // chart
  scoreHistory.push(score);
  if (scoreHistory.length > 40) scoreHistory.shift();
  chart.data.labels           = scoreHistory.map((_, i) => i);
  chart.data.datasets[0].data = [...scoreHistory];
  chart.data.datasets[1].data = scoreHistory.map(() => THRESHOLD);
  chart.data.datasets[0].pointBackgroundColor = scoreHistory.map(
    s => s < THRESHOLD ? 'rgba(255,60,95,0.9)' : 'rgba(0,255,255,0.7)'
  );
  chart.update('none');

  // event log row
  const tbody = document.getElementById('log-rows');
  const tr    = document.createElement('tr');
  tr.className = (isAlert ? 'row-alert' : 'row-normal') + ' new-row';
  tr.innerHTML = `
    <td>${totalChecks}</td>
    <td>${ts}</td>
    <td style="color:var(--dim);font-size:.7rem">${source}</td>
    <td><span class="badge ${isAlert ? 'badge-alert' : 'badge-normal'}">${isAlert ? 'INTRUSION' : 'NORMAL'}</span></td>
    <td>${score.toFixed(4)}</td>
    <td>${(data.cpu  ?? 0).toFixed(1)}</td>
    <td>${(data.mem  ?? 0).toFixed(1)}</td>
    <td>${(data.net  ?? 0).toFixed(1)}</td>
    <td>${data.proc  ?? 0}</td>
    <td>${data.sudo  ?? 0}</td>
    <td>${data.fail  ?? 0}</td>`;
  tbody.insertBefore(tr, tbody.firstChild);
  if (tbody.children.length > 200) tbody.removeChild(tbody.lastChild);
}

// ── fetch real data from Flask ─────────────────────────────────────────────────
async function fetchRealData() {
  const statusEl = document.getElementById('flask-status');
  try {
    const res  = await fetch('http://127.0.0.1:5000/metrics');
    const data = await res.json();
    recordSample(data, 'live');
    statusEl.textContent = '● Flask online';
    statusEl.className   = 'online';
  } catch(e) {
    statusEl.textContent = '✕ Flask offline — run app.py';
    statusEl.className   = 'offline';
  }
}

// ── inject normal preset ───────────────────────────────────────────────────────
function injectNormal() {
  document.getElementById('f-cpu').value   = 20;
  document.getElementById('f-mem').value   = 83;
  document.getElementById('f-disk').value  = 30;
  document.getElementById('f-net').value   = 10;
  document.getElementById('f-proc').value  = 330;
  document.getElementById('f-spawn').value = 0;
  document.getElementById('f-sudo').value  = 0;
  document.getElementById('f-fail').value  = 0;
  runCustom();
}

// ── inject attack preset ───────────────────────────────────────────────────────
function injectAnomaly() {
  document.getElementById('f-cpu').value   = 95;
  document.getElementById('f-mem').value   = 90;
  document.getElementById('f-disk').value  = 50;
  document.getElementById('f-net').value   = 900;
  document.getElementById('f-proc').value  = 1200;
  document.getElementById('f-spawn').value = 25;
  document.getElementById('f-sudo').value  = 8;
  document.getElementById('f-fail').value  = 150;
  runCustom();
}

// ── run custom sample via Flask ────────────────────────────────────────────────
// We send the values to Flask and let the real model score them
async function runCustom() {
  const cpu   = parseFloat(document.getElementById('f-cpu').value)   || 0;
  const mem   = parseFloat(document.getElementById('f-mem').value)   || 0;
  const disk  = parseFloat(document.getElementById('f-disk').value)  || 0;
  const net   = parseFloat(document.getElementById('f-net').value)   || 0;
  const proc  = parseFloat(document.getElementById('f-proc').value)  || 0;
  const spawn = parseFloat(document.getElementById('f-spawn').value) || 0;
  const sudo  = parseFloat(document.getElementById('f-sudo').value)  || 0;
  const fail  = parseFloat(document.getElementById('f-fail').value)  || 0;

  const banner = document.getElementById('result-banner');

  try {
    const params = new URLSearchParams({ cpu, mem, disk, net, proc, spawn, sudo, fail });
    const res    = await fetch(`http://127.0.0.1:5000/inject?${params}`);
    const data   = await res.json();
    recordSample(data, 'inject');

    banner.style.display = 'block';
    banner.className     = data.intrusion ? 'alert' : 'safe';
    banner.textContent   = data.intrusion
      ? `⚠ INTRUSION DETECTED — score: ${data.score.toFixed(4)} (threshold: ${THRESHOLD})`
      : `✓ Normal — score: ${data.score.toFixed(4)} (threshold: ${THRESHOLD})`;
  } catch(e) {
    banner.style.display = 'block';
    banner.className     = 'alert';
    banner.textContent   = '✕ Flask offline — start app.py first';
  }
}

// ── clear log ──────────────────────────────────────────────────────────────────
function clearLog() {
  document.getElementById('log-rows').innerHTML = '';
  scoreHistory = []; totalChecks = 0; alertCount = 0;
  ['stat-total','stat-alerts','stat-fpr','stat-score'].forEach(id => {
    document.getElementById(id).textContent = id === 'stat-fpr' ? '—' : '0';
  });
  document.getElementById('result-banner').style.display = 'none';
  chart.data.labels = [];
  chart.data.datasets.forEach(d => d.data = []);
  chart.update('none');
  document.getElementById('status-pill').textContent = '● SYSTEM SECURE';
  document.getElementById('status-pill').className   = '';
}

// ── clock ──────────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

// ── auto-poll Flask every 5 seconds ───────────────────────────────────────────
setInterval(fetchRealData, 5000);
fetchRealData();
</script>
</body>
</html>
